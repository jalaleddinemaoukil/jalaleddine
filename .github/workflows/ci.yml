name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: NPM Audit (High)
        run: npm audit --audit-level=high

      - name: OSV Scanner
        uses: google/osv-scanner-action@v1.7.3
        with:
          scan-args: "--lockfile=package-lock.json"

      - name: Lighthouse CI
        run: npx @lhci/cli@0.13.0 autorun --config=./lighthouserc.json
